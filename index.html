<body>
  <div id="root"></div>

  <script type="text/babel" src="product-screens.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { Homepage } = window;

    // Responsive: below 768px show the mobile design, otherwise the desktop design.
    function Site() {
      const mq = React.useMemo(() => window.matchMedia("(max-width: 767px)"), []);
      const [mobile, setMobile] = React.useState(mq.matches);
      React.useEffect(() => {
        const onChange = (e) => setMobile(e.matches);
        mq.addEventListener ? mq.addEventListener("change", onChange) : mq.addListener(onChange);
        return () => {
          mq.removeEventListener ? mq.removeEventListener("change", onChange) : mq.removeListener(onChange);
        };
      }, [mq]);
      React.useEffect(() => {
        fetch("https://jeno-energy-e92646de1825.herokuapp.com/api/public/pageview", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            path: window.location.pathname || "/",
            referrer: document.referrer || "",
          }),
          keepalive: true,
        }).catch(() => {});
      }, []);
      return <Homepage mobile={mobile} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Site />);
  </script>
</body>
